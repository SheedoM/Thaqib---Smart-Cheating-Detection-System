name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-ai.txt -r requirements-dev.txt
      - name: Static checks
        run: |
          ruff check src tests
      - name: Unit tests
        env:
          APP_ENV: testing
          SECRET_KEY: test-secret-key-with-at-least-32-characters
          INTERNAL_EVENT_TOKEN: test-internal-event-token
          STREAM_MANAGER_ENABLED: "false"
        run: |
          pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      # package.json pins npm@11.6.2 (packageManager/engines); node 22 ships npm 10.x,
      # which resolves the lockfile differently and breaks `npm ci`. Match the pin
      # (mirrors frontend/Dockerfile).
      - run: npm install -g npm@11.6.2
      - run: npm ci
      - run: npm run lint
      - run: npm run test:run
      - run: npm run build
      - run: npm run e2e -- --list
      - run: npm audit --audit-level=high

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build --build-arg INSTALL_AI=false -t thaqib-backend:ci .
      - name: Build frontend image
        run: docker build -t thaqib-frontend:ci ./frontend
      - name: Validate production compose file
        env:
          POSTGRES_PASSWORD: ci-postgres-password
          THAQIB_ENV_FILE: .env.production.example
        run: |
          docker compose -f docker-compose.prod.yml config
