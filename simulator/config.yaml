# Server settings
server:
  host: 0.0.0.0
  port: 8000
  # Quality for MJPEG streaming (1-100)
  jpeg_quality: 85
  # Frame skip for bandwidth control (1 = every frame, 2 = every 2nd frame)
  frame_skip: 1
